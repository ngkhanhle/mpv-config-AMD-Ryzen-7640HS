# ==========    GENERAL SETTINGS   ==========

priority=abovenormal
# Makes PC prioritize MPV for allocating resources (Windows only)
save-position-on-quit=yes
# Saving playback position on quit
fullscreen=yes
# Start in fullscreen
keep-open=no
# Don't close the player after finishing the video
taskbar-progress=no
# Disable playback progress rendering in taskbar
window-scale=1.5
video-aspect-override=no
save-watch-history=yes
loop-playlist=inf
directory-mode=auto
directory-filter-types=video,audio,playlist
autocreate-playlist=filter
shuffle=yes
watch-later-options-remove=sub-pos,osd-margin-y
watch-later-options=start,aid
cache-secs=30
cache=yes
keepaspect=yes
load-console=yes
demuxer-readahead-secs=5
# msg-level=all=v

# ==========    LANGUAGE PRIORITY    ==========

slang=ko,vn,en

# ==========    ON SCREEN DISPLAY AND ON SCREEN CONTROLLER    ==========

osc=no
osd-bar=no
# Don't show a huge volume box on screen when turning the volume up/down
border=yes
# Whether or not to use the native window decorations, border, and controls. No disables it and uses custom versions.
cursor-autohide-fs-only=no
# If this option is given, the cursor is always visible in windowed mode
osd-scale-by-window=yes
cursor-autohide=100
# Cursor hide in ms
osd-level=0
# https://mpv.io/manual/stable/#options-osd-level
osd-duration=100
# Set the duration of the OSD messages in ms

osd-font='DejaVu Sans Mono'
osd-font-size=16
osd-color='#FFFFFF'
# Hex code for white
osd-border-color='#000000'
# Hex code for black
osd-border-size=0.5
# Size for osd text and progress bar
osd-blur=0.5
# Gaussian blur factor. 0 means no blur applied (default)
osd-status-msg=${playback-time/full} / ${duration} (${percent-pos}%)\nframe: ${estimated-frame-number} / ${estimated-frame-count}
osd-playing-msg=$>


# ==========    SUBTITLES    ==========

# Subtitle loading (exact/fuzzy/no)
sub-auto=fuzzy

# MKV subtitle seeking behavior
demuxer-mkv-subtitle-preroll=index

# Preserve authored ASS subtitle styling
sub-ass-override=yes
sub-ass-use-video-data=all
sub-fix-timing=no

# The following options mainly apply to plain-text / unstyled subtitles
sub-ass-style-overrides=PlayResX=3840,PlayResY=2160,Kerning=yes
sub-font='DejaVu Sans Mono'
sub-font-size=22
sub-color='#FFFFFFFF'
sub-blur=0.5
sub-border-color='#FF000000'
sub-border-style=outline-and-shadow
sub-border-size=1.0
sub-shadow-offset=0.5
sub-spacing=0.0
sub-pos=100
sub-margin-y=16

# ==========    YouTube / yt-dlp    ==========

ytdl=yes
script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format=bestvideo+bestaudio/best
# bestvideo[vcodec!*=av01]+bestaudio/best[vcodec!*=av01]	bestvideo[vcodec!*=av01]+bestaudio/best[vcodec!*=av01]
ytdl-raw-options=cookies="C:\Users\KAI-GMKtec\AppData\Roaming\mpv\cookies.txt"

# ==========    AUDIO    ==========

ao=wasapi
audio-device=auto
audio-exclusive=no
initial-audio-sync=yes
replaygain=no
volume-max=100
audio-file-auto=no
audio-buffer=0.2
af=lavfi="loudnorm=I=-16:TP=-1.5:LRA=9:linear=false:offset=-1.0,aresample=resampler=soxr:dither_method=improved_e_weighted:cutoff=0.91:precision=20:rematrix_maxval=1.0:rmvol=1.0"
audio-channels=2.1

# ==========    VIDEO    ==========

vo=gpu-next
gpu-api=d3d11
hwdec=d3d11va
d3d11-adapter='AMD Radeon 760M Graphics'
hwdec-codecs=h264,hevc,vp9,av1,vc1,mpeg2video
hwdec-threads=0
hwdec-software-fallback=yes
d3d11-warp=no
d3d11-output-mode=auto
d3d11-flip=yes
d3d11-sync-interval=1
d3d11-output-format=auto
d3d11-output-csp=auto
d3d11va-zero-copy=yes

vd-lavc-check-hw-profile=yes
vd-lavc-dr=yes
vd-lavc-fast=yes

hdr-compute-peak=no
video-sync=audio
interpolation=no
# tscale=oversample

scaler-resizes-only=yes

scale=bilinear
cscale=catmull_rom
dscale=mitchell

deinterlace=no

dither-depth=8
dither=fruit
deband=no

correct-downscaling=no
linear-downscaling=no
linear-upscaling=no
sigmoid-upscaling=no

[low-res]
profile-cond=(width < 2560 and height < 1440)
scale=lanczos
dscale=hermite
profile-restore=copy
# deband-iterations=1 deband-threshold=32
# deband-range=16 deband-grain=1
# ewa_robidouxsharp		ewa_lanczossharp		ewa_ginseng		spline36	catmull_rom		mitchell	bilinear

